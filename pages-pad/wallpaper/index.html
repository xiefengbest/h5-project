<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AnyWP - Library · Pad</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --bg-page: #ffffff;
            --text-primary: #1c1c1e;
            --text-secondary: #6e6e73;
            --card-bg: #ffffff;
            --card-bg-secondary: #e5e5ea;
            --border-subtle: rgba(0, 0, 0, 0.08);
            --card-radius: 24px;
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
            --demo-max-width: 1280px;
            --demo-frame-bg: #d4d4d8;
            --spacing-h: 32px;
            --app-bar-height: 64px;
            --touch-min: 48px;
            --nav-bg: rgba(255, 255, 255, 0.85);
            /* TCL Pad 壁纸：横屏 16:10 / 竖屏 10:16（仅比例，布局不变） */
            --wallpaper-aspect: 16 / 10;
            --wallpaper-w: 1280;
            --wallpaper-h: 800;
            --detail-stage-max-h: calc(100vh - var(--app-bar-height) - 168px);
        }

        @media (orientation: portrait) {
            :root {
                --wallpaper-aspect: 10 / 16;
                --wallpaper-w: 800;
                --wallpaper-h: 1280;
            }
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0b0b0b;
                --bg-page: #000000;
                --text-primary: #ffffff;
                --text-secondary: #8e8e93;
                --card-bg: #1c1c1e;
                --card-bg-secondary: #2c2c2e;
                --border-subtle: rgba(255, 255, 255, 0.08);
                --demo-frame-bg: #1c1c1e;
                --nav-bg: rgba(28, 28, 30, 0.88);
            }
            body {
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            display: flex;
            justify-content: center;
            min-height: 100%;
            background: var(--demo-frame-bg);
        }

        body {
            font-family: Roboto, "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.4;
            width: 100%;
            max-width: var(--demo-max-width);
            min-height: 100vh;
            margin: 0;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.12);
        }

        .container {
            padding: 0 var(--spacing-h) calc(var(--safe-area-bottom) + 24px);
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* 统一导航栏规范：44px 内容区 + safe-area + 10px 顶距 */
        .nav-header {
            min-height: calc(var(--safe-area-top) + 54px);
            padding: calc(var(--safe-area-top) + 10px) 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--nav-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }

        .nav-title {
            font-size: 22px;
            font-weight: 700;
            line-height: 44px;
            margin: 0;
            color: var(--text-primary);
        }

        .nav-back {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            margin-left: -10px;
            color: var(--text-primary);
            text-decoration: none;
        }

        /* 首页：顶部透明，吸顶后显示毛玻璃背景 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 25px;
            margin-left: -16px;
            margin-right: -16px;
            width: calc(100% + 32px);
            padding-left: 16px;
            padding-right: 16px;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            transition: background-color 0.22s ease, backdrop-filter 0.22s ease, -webkit-backdrop-filter 0.22s ease;
        }

        .header.is-stuck {
            background-color: var(--nav-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }

        /* 置于 header 之前，滚出视口时触发 is-stuck；不占 header 与内容间距 */
        .header-scroll-sentinel {
            height: 1px;
            margin: 0;
            pointer-events: none;
            visibility: hidden;
        }

        .detail-header {
            margin-bottom: 8px;
        }

        .detail-header .back-icon {
            flex: 1;
            min-width: 0;
        }

        .detail-header .back-icon svg {
            flex-shrink: 0;
        }

        .detail-header .back-icon span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .detail-header .wallpapers-badge {
            flex-shrink: 0;
            margin-left: 12px;
            white-space: nowrap;
        }

        .tabs {
            display: flex;
            gap: 20px;
            align-items: center;
            height: 44px;
        }

        .tab-item {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.5;
            line-height: 44px;
        }

        .tab-item.active {
            color: var(--text-primary);
            opacity: 1;
            transform: scale(1.05);
        }

        .header-settings {
            width: 24px;
            height: 44px;
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.detail-open .header {
            visibility: hidden;
            pointer-events: none;
        }

        .back-icon {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            height: 44px;
        }

        .wallpapers-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
            font-size: 14px;
            opacity: 0.7;
            height: 44px;
        }

        /* 全屏预览 Header */
        .preview-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        .preview-back {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            color: #fff;
            cursor: pointer;
        }

        /* Date Section */
        .date-section {
            margin-bottom: 20px;
            padding-left: 4px;
            margin-top: 20px;
        }

        .date-section:first-of-type {
            margin-top: 0;
        }

        .date-day {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .date-month {
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* Grid Layout */
        .wallpaper-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 40px;
        }

        .wallpaper-card {
            position: relative;
            aspect-ratio: var(--wallpaper-aspect);
            border-radius: var(--card-radius);
            overflow: hidden;
            background-color: var(--card-bg-secondary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .wallpaper-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, opacity 0.5s ease;
            opacity: 0;
        }

        .wallpaper-img.loaded {
            opacity: 1;
        }

        .wallpaper-card:active .wallpaper-img {
            transform: scale(0.98);
        }

        .wallpaper-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            z-index: 2;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
        }

        /* 可点击文案通用样式优化 */
        .clickable-news-title {
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .clickable-news-title:active {
            opacity: 0.7;
        }

        /* 首页和全屏预览页：深色背景上的文案 */
        .wallpaper-name.clickable-news-title,
        .preview-title.clickable-news-title,
        .detail-hero-title.clickable-news-title {
            color: #ffffff !important;
            border-bottom: none;
            padding-bottom: 0;
            text-decoration: none;
            display: flex;
            align-items: center;
            width: 100%;
            overflow: hidden;
        }

        /* 确保首页/预览页文案中的 span 处理省略号，箭头不被挤压 */
        .wallpaper-name.clickable-news-title span,
        .preview-title.clickable-news-title span,
        .detail-hero-title.clickable-news-title span {
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            white-space: normal;
        }

        /* 详情页下方推荐：卡片背景上的文案 */
        .detail-card-title.clickable-news-title {
            color: var(--text-primary) !important;
            border-bottom: none;
            padding-bottom: 0;
            text-decoration: none;
            display: flex;
            align-items: center;
            width: 100%;
            overflow: hidden;
        }

        /* 确保详情页下方卡片文案中的 span 处理省略号，箭头不被挤压 */
        .detail-card-title.clickable-news-title span {
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            white-space: normal;
        }

        .wallpaper-name.clickable-news-title .news-arrow-icon,
        .preview-title.clickable-news-title .news-arrow-icon,
        .detail-hero-title.clickable-news-title .news-arrow-icon,
        .detail-card-title.clickable-news-title .news-arrow-icon {
            flex-shrink: 0;
            margin-left: 8px;
        }

        /* 箭头图标样式 */
        .news-arrow-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        /* 卡片背景上的箭头样式 */
        .detail-card-title.clickable-news-title .news-arrow-icon {
            background: var(--border-subtle);
            color: var(--text-primary);
        }

        .news-arrow-icon svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
        }

        .wallpaper-name {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.4;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            max-height: calc(1.4em * 2);
        }

        /* 详情页样式 */
        .detail-page {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: var(--demo-max-width);
            background: var(--bg-page);
            z-index: 1000;
            display: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .detail-page.is-visible {
            animation: detailSlideIn 0.32s cubic-bezier(0.32, 0.72, 0, 1);
        }

        @keyframes detailSlideIn {
            from {
                opacity: 0;
                transform: translateX(-50%) scale(0.985);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }
        }

        .detail-hero-scroll {
            display: flex;
            align-items: flex-start;
            gap: 60px;
            overflow-x: auto;
            overflow-y: visible;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding: 0 60px 16px;
            margin-bottom: 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .detail-hero-scroll::-webkit-scrollbar {
            display: none;
        }

        .detail-hero-container {
            flex-shrink: 0;
            width: calc(100vw - 120px);
            max-width: calc(var(--demo-max-width) - 120px);
            scroll-snap-align: center;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .detail-hero {
            width: 100%;
            aspect-ratio: var(--wallpaper-aspect);
            position: relative;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .detail-hero--drama {
            aspect-ratio: 9 / 16;
            cursor: pointer;
        }

        .detail-hero--wallpaper > img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 短剧轮播卡（参考 short-dramas.html） */
        .detail-hero--drama .hero-media-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(28px) brightness(0.7);
            transform: scale(1.15);
            z-index: 0;
        }

        .detail-hero--drama .hero-media {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(calc(-50% - 28px));
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            z-index: 1;
        }

        .detail-hero--drama .hero-play-btn {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            width: 64px;
            height: 64px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        .detail-hero--drama .hero-play-btn svg {
            width: 28px;
            height: 28px;
            fill: #fff;
            margin-left: 4px;
        }

        .detail-hero--drama .hero-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            padding: 48px 20px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
        }

        .detail-hero--drama .hero-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.95);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            backdrop-filter: blur(8px);
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }

        .detail-hero--drama .hero-title {
            color: #fff;
            font-size: 20px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .detail-hero--drama .hero-desc {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .detail-hero--drama .hero-play-cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            color: #000;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .detail-hero--drama .hero-play-cta svg {
            width: 16px;
            height: 16px;
            fill: #000;
        }

        .detail-hero-info {
            position: absolute;
            bottom: 24px;
            left: 20px;
            right: 20px;
            z-index: 2;
            cursor: pointer;
        }

        .detail-hero-title {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.4;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            margin: 0;
        }

        .detail-hero-title span {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-height: calc(1.4em * 2);
        }

        .detail-main-actions,
        .detail-hero-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px 20px;
            width: 100%;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .detail-hero-actions {
            padding: 12px 4px 0;
        }

        .detail-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
        }

        .detail-stat svg {
            opacity: 0.9;
        }

        .action-save-btn {
            background: var(--text-primary);
            color: var(--bg-page);
            padding: 10px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        /* 全屏预览样式 */
        .preview-page {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: var(--demo-max-width);
            background: var(--bg-page);
            z-index: 2000;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-footer {
            position: absolute;
            bottom: calc(var(--safe-area-bottom) + 30px);
            left: 20px;
            right: 20px;
            z-index: 2010;
        }

        .preview-title {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 24px;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .preview-title span {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-height: calc(1.4em * 2);
        }

        .preview-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
        }

        .preview-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            color: #fff;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }

        .detail-content {
            background: var(--bg-page);
            padding: 0 16px 40px;
        }

        .detail-content-header {
            padding: 0 0 14px;
        }

        .detail-content-title {
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 700;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* 短剧推荐网格（参考 short-dramas.html） */
        .detail-drama-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: var(--card-bg);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            cursor: pointer;
        }

        .detail-drama-card:active {
            transform: scale(0.98);
        }

        .detail-drama-card-img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            display: block;
        }

        .detail-drama-card-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            z-index: 1;
            pointer-events: none;
        }

        .detail-drama-card-play svg {
            width: 18px;
            height: 18px;
            fill: #fff;
            margin-left: 2px;
        }

        .detail-drama-card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 32px 12px 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
        }

        .detail-drama-card-title {
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .detail-drama-card-meta {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-drama-card-genre {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.95);
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .detail-card {
            border-radius: 20px;
            overflow: hidden;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
        }

        .detail-card-img {
            width: 100%;
            aspect-ratio: var(--wallpaper-aspect);
            object-fit: cover;
        }

        .detail-card-footer {
            padding: 12px;
            background: var(--card-bg);
        }

        .detail-card-title {

    <script>
        /** Pad 壁纸：竖屏仅切换图片比例 10:16，布局不变 */
        const PAD_WALLPAPER_SIZES = {
            landscape: {
                hero: [1280, 800],
                list: [640, 400],
                thumb: [160, 100],
                feed: [480, 300]
            },
            portrait: {
                hero: [800, 1280],
                list: [400, 640],
                thumb: [100, 160],
                feed: [300, 480]
            }
        };

        function getPadOrientation() {
            return window.matchMedia('(orientation: portrait)').matches ? 'portrait' : 'landscape';
        }

        function padWallpaperUrl(id, sizeOrW, h) {
            const o = getPadOrientation();
            let w;
            if (typeof sizeOrW === 'string') {
                const preset = PAD_WALLPAPER_SIZES[o][sizeOrW] || PAD_WALLPAPER_SIZES[o].list;
                w = preset[0];
                h = preset[1];
            } else if (sizeOrW == null && h == null) {
                w = PAD_WALLPAPER_SIZES[o].hero[0];
                h = PAD_WALLPAPER_SIZES[o].hero[1];
            } else {
                w = sizeOrW;
                if (h == null) {
                    h = o === 'portrait'
                        ? Math.round(w * 16 / 10)
                        : Math.round(w * 10 / 16);
                }
            }
            return 'https://picsum.photos/id/' + id + '/' + w + '/' + h;
        }

        function applyPadOrientation() {
            const portrait = getPadOrientation() === 'portrait';
            document.documentElement.style.setProperty('--wallpaper-aspect', portrait ? '10 / 16' : '16 / 10');
            document.documentElement.style.setProperty('--wallpaper-w', portrait ? '800' : '1280');
            document.documentElement.style.setProperty('--wallpaper-h', portrait ? '1280' : '800');

            const detailPage = document.getElementById('detail-page');
            const isDetailOpen = detailPage?.classList.contains('is-visible');
            const currentId = isDetailOpen
                ? (carouselItems[carouselIndex]?.type === 'wallpaper'
                    ? carouselItems[carouselIndex].id
                    : Number(detailPage.dataset.currentNewsId))
                : null;

            generateContent();

            if (isDetailOpen) {
                if (currentId != null && !Number.isNaN(currentId)) {
                    buildCarousel(currentId);
                }
                renderCarouselHero();
                requestAnimationFrame(function () {
                    scrollHeroToIndex(carouselIndex, false);
                    updateCarouselExtras();
                });
                const previewPage = document.getElementById('preview-page');
                if (previewPage?.style.display === 'flex') {
                    const item = carouselItems[carouselIndex];
                    if (item?.type === 'wallpaper') {
                        document.getElementById('preview-img').src = padWallpaperUrl(item.id, 'hero');
                    }
                }
            }
        }

        const newsData = [

        function getHeroIndexFromScroll() {
            const scroll = document.getElementById('heroScroll');
            if (!scroll) return 0;
            const containers = scroll.querySelectorAll('.detail-hero-container');
            if (!containers.length) return 0;
            const center = scroll.scrollLeft + scroll.clientWidth / 2;
            let best = 0;
            let bestDist = Infinity;
            containers.forEach((el, i) => {
                const elCenter = el.offsetLeft + el.offsetWidth / 2;
                const dist = Math.abs(center - elCenter);
                if (dist < bestDist) {
                    bestDist = dist;
                    best = i;
                }
            });
            return best;
        }

            const targetLeft = container.offsetLeft - (scroll.clientWidth - container.offsetWidth) / 2;
            scroll.scrollTo({
                left: targetLeft,
                behavior: smooth ? 'smooth' : 'auto'
            });
        }

            const positionsSet = new Set(Array.isArray(g.positions) ? g.positions : [4, 7]);
            const cells = [];
            let dramaIdx = 0;
            let newsIdx = 0;
            for (let pos = 1; pos <= 9; pos++) {
                const isNews = g.enabled && positionsSet.has(pos);
                if (isNews) {
                    const article = slotItems[(newsOffset + 11 + newsIdx) % slotItems.length];
                    const gradient = newsGradients[(carouselIndex + 2 + newsIdx) % newsGradients.length];
                    cells.push({ type: 'news', article, gradient });
                    newsIdx++;
                } else {
                    cells.push({ type: 'drama', d: dramas[dramaIdx++] });

            grid.innerHTML = cells.map(c => {
                if (c.type === 'news') return renderNewsCell(c.article, c.gradient);

        function setupHeroScroll() {
            const scroll = document.getElementById('heroScroll');
            if (!scroll) return;

                requestAnimationFrame(() => {

                    if (idx !== carouselIndex) {
                        carouselIndex = idx;
                        updateCarouselExtras();

                    heroScrollTicking = false;

            document.getElementById('heroNavNext')?.addEventListener('click', () => navHero(1));

            document.addEventListener('keydown', (e) => {

                if (document.getElementById('preview-page')?.style.display === 'flex') return;
                if (e.key === 'ArrowLeft') { e.preventDefault(); navHero(-1); }
                if (e.key === 'ArrowRight') { e.preventDefault(); navHero(1); }
            });
        }

        function openDetail(imgSrc, title, newsId) {
            const detailPage = document.getElementById('detail-page');
            buildCarousel(newsId);
            renderCarouselHero();
            detailPage.classList.remove('is-visible');
            detailPage.style.display = 'block';
            void detailPage.offsetWidth;
            detailPage.classList.add('is-visible');
            detailPage.scrollTop = 0;
            document.body.style.overflow = 'hidden';
            document.body.classList.add('detail-open');
            requestAnimationFrame(() => {
                scrollHeroToIndex(carouselIndex, false);
                updateCarouselExtras();
            });
        }

        function openPreviewAt(index) {
            carouselIndex = index;
            openPreview();
        }

        function closeDetail() {
            const detailPage = document.getElementById('detail-page');
            detailPage.classList.remove('is-visible');
            detailPage.style.display = 'none';
            document.body.style.overflow = '';
            document.body.classList.remove('detail-open');
        }

        function openPreview() {
            const item = carouselItems[carouselIndex];
            if (!item || item.type !== 'wallpaper') return;

            document.getElementById('preview-img').src = padWallpaperUrl(item.id, 'hero');
            document.getElementById('preview-title').innerHTML = `
                <span>${item.caption}</span>
            `;
            document.getElementById('preview-title').onclick = null;
            document.getElementById('preview-page').style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('preview-page').style.display = 'none';
        }

        function generateContent() {
            const root = document.getElementById('content-root');
            root.querySelectorAll('.date-section, .wallpaper-grid').forEach(function (el) { el.remove(); });

            dates.forEach((date, dateIdx) => {
                const section = document.createElement('section');
                section.className = 'date-section';
                section.innerHTML = `
                    <p class="date-day">${date.day}</p>
                    <p class="date-month">${date.month}</p>
                `;
                root.appendChild(section);

                const grid = document.createElement('main');
                grid.className = 'wallpaper-grid';

                for (let i = 0; i < 10; i++) {
                    const newsIdx = (dateIdx * 10 + i) % newsData.length;
                    const news = newsData[newsIdx];
                    const imgSrc = padWallpaperUrl(news.id, 'list');

                    const card = document.createElement('div');
                    card.className = 'wallpaper-card';
                    card.dataset.wallpaperId = news.id;
                    card.onclick = () => openDetail(null, wallpaperCaption(news), news.id);

                    card.innerHTML = `
                        <img class="wallpaper-img" loading="lazy" src="${imgSrc}" alt="${wallpaperCaption(news)}" onload="this.classList.add('loaded')">
                        <div class="wallpaper-info">
                            <div class="wallpaper-name">${wallpaperCaption(news)}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                }
                root.appendChild(grid);
            });
        }

        applyPadOrientation();
        setupHeroScroll();
        setupHomeHeaderStick();
        window.matchMedia('(orientation: portrait)').addEventListener('change', applyPadOrientation);

        function setupHomeHeaderStick() {
            const header = document.querySelector('.header');
            const sentinel = document.querySelector('.header-scroll-sentinel');
            if (!header || !sentinel || !('IntersectionObserver' in window)) return;

            const observer = new IntersectionObserver(function (entries) {
                var entry = entries[0];
                header.classList.toggle('is-stuck', !entry.isIntersecting);
            }, { threshold: 0 });

            observer.observe(sentinel);
        }
    </script>
</body>
</html>
