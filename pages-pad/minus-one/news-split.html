<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>News · Pad</title>
    <style>
        :root {
            --surface: #ffffff;
            --surface-container: #f2f2f7;
            --text-primary: #1c1c1e;
            --text-secondary: #6e6e73;
            --border-color: #e5e5ea;
            --nav-bg: rgba(255, 255, 255, 0.92);
            --accent: #1a73e8;
            --accent-soft: rgba(26, 115, 232, 0.12);
            --demo-max-width: 1280px;
            --demo-frame-bg: #d4d4d8;
            --list-pane-width: 420px;
            --portrait-break: 900px;
            --app-bar-height: 64px;
            --touch-min: 48px;
            --spacing-h: 32px;
            --spacing-v: 24px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --safe-area-top: env(safe-area-inset-top);
            --skeleton-base: #e5e5ea;
            --skeleton-highlight: #f2f2f7;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --surface: #1e1e1e;
                --surface-container: #121212;
                --text-primary: #e8eaed;
                --text-secondary: #9aa0a6;
                --border-color: rgba(255, 255, 255, 0.1);
                --nav-bg: rgba(18, 18, 18, 0.92);
                --demo-frame-bg: #0d0d0d;
                --accent-soft: rgba(138, 180, 248, 0.16);
                --skeleton-base: #2c2c2e;
                --skeleton-highlight: #3a3a3c;
            }
        }

        @keyframes skShimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .sk {
            background: linear-gradient(
                90deg,
                var(--skeleton-base) 0%,
                var(--skeleton-highlight) 50%,
                var(--skeleton-base) 100%
            );
            background-size: 200% 100%;
            animation: skShimmer 1.4s ease-in-out infinite;
            border-radius: 8px;
        }

        body.is-booting .app-content {
            visibility: hidden;
            pointer-events: none;
        }

        body:not(.is-booting) .page-skeleton {
            display: none;
        }

        .app-bar-title.sk-bar {
            width: 88px;
            height: 28px;
            border-radius: 8px;
            margin-top: 18px;
        }

        .page-skeleton {
            position: absolute;
            inset: 0;
            display: flex;
            z-index: 20;
            pointer-events: none;
        }

        .master-detail {
            position: relative;
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .app-content {
            flex: 1;
            display: flex;
            min-height: 0;
            min-width: 0;
        }

        .sk-list-pane {
            flex: 0 0 var(--list-pane-width);
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 12px;
            border-right: 1px solid var(--border-color);
            background: var(--surface-container);
            overflow: hidden;
        }

        .sk-list-inner {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .sk-list-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            margin-bottom: 4px;
        }

        .sk-list-text {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sk-list-title {
            height: 16px;
            width: 100%;
            border-radius: 6px;
        }

        .sk-list-title.short {
            width: 72%;
        }

        .sk-list-meta {
            height: 12px;
            width: 45%;
            border-radius: 4px;
        }

        .sk-list-cover {
            flex-shrink: 0;
            width: 120px;
            height: 90px;
            border-radius: var(--radius-md);
        }

        .sk-detail-pane {
            flex: 1;
            min-width: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: var(--spacing-v) var(--spacing-h);
            background: var(--surface);
            overflow: hidden;
        }

        .sk-detail-inner {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            max-width: 760px;
            overflow-y: auto;
        }

        /* 防止 flex 子项被压扁：仅保留底部 fill 块可伸缩 */
        .sk-detail-title,
        .sk-detail-meta,
        .sk-detail-para,
        .sk-detail-image {
            flex-shrink: 0;
        }

        .sk-detail-fill {
            flex: 1 1 auto;
            flex-shrink: 0;
            min-height: 48px;
            border-radius: var(--radius-lg);
            margin-top: 8px;
        }

        .sk-detail-title {
            height: 32px;
            width: 88%;
            border-radius: 8px;
            margin-bottom: 14px;
        }

        .sk-detail-title.line2 {
            width: 62%;
            margin-bottom: 20px;
        }

        .sk-detail-meta {
            height: 14px;
            width: 160px;
            border-radius: 4px;
            margin-bottom: 28px;
        }

        .sk-detail-para {
            height: 14px;
            width: 100%;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .sk-detail-para.mid { width: 94%; }
        .sk-detail-para.short { width: 68%; }

        .sk-detail-image {
            width: 100%;
            max-width: 760px;
            aspect-ratio: 16 / 9;
            border-radius: var(--radius-lg);
            margin: 24px 0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        html {
            display: flex;
            justify-content: center;
            min-height: 100%;
            background: var(--demo-frame-bg);
        }

        body {
            width: 100%;
            max-width: var(--demo-max-width);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--surface-container);
            color: var(--text-primary);
            font-family: Roboto, "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            box-shadow: 0 0 48px rgba(0, 0, 0, 0.15);
        }

        /* App Bar */
        .app-bar {
            flex-shrink: 0;
            min-height: calc(var(--safe-area-top) + var(--app-bar-height));
            padding: calc(var(--safe-area-top) + 8px) var(--spacing-h) 0;
            display: flex;
            align-items: center;
            background: var(--nav-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--border-color);
        }

        .app-bar-title {
            font-size: 24px;
            font-weight: 500;
            line-height: var(--app-bar-height);
            letter-spacing: 0.15px;
        }

        /* 左栏：列表导航 */
        .list-pane {
            flex: 0 0 var(--list-pane-width);
            display: flex;
            flex-direction: column;
            background: var(--surface-container);
            border-right: 1px solid var(--border-color);
        }

        .list-scroll {
            flex: 1;
            overflow-y: auto;
            overscroll-behavior: contain;
            padding: 12px 12px var(--spacing-v);
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            min-height: var(--touch-min);
            text-align: left;
            padding: 12px 16px;
            margin-bottom: 4px;
            border: none;
            border-radius: var(--radius-md);
            background: transparent;
            cursor: pointer;
            font-family: inherit;
            color: inherit;
            transition: background 0.15s ease;
            position: relative;
        }

        .list-item:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        @media (prefers-color-scheme: dark) {
            .list-item:hover {
                background: rgba(255, 255, 255, 0.06);
            }
        }

        .list-item:active {
            background: rgba(0, 0, 0, 0.06);
        }

        .list-item.is-selected {
            background: var(--accent-soft);
        }

        .list-item.is-selected::before {
            content: "";
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: var(--accent);
        }

        .list-item-body {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
        }

        .list-item-cover {
            flex-shrink: 0;
            width: 120px;
            height: 90px;
            border-radius: var(--radius-md);
            object-fit: cover;
            background: var(--surface);
        }

        .list-item-title {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .list-item.is-selected .list-item-title {
            color: var(--accent);
        }

        .list-item-meta {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.3;
        }

        /* 分页加载 */
        .list-load-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 56px;
            padding: 16px 0 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .list-load-footer[hidden] {
            display: none !important;
        }

        .list-load-spinner {
            width: 24px;
            height: 24px;
            border: 2.5px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: listSpin 0.75s linear infinite;
        }

        @keyframes listSpin {
            to { transform: rotate(360deg); }
        }

        .list-load-footer.is-end {
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* 右栏：正文详情 */
        .detail-pane {
            flex: 1;
            min-width: 0;
            overflow-y: auto;
            overscroll-behavior: contain;
            background: var(--surface);
            padding: var(--spacing-v) var(--spacing-h) 56px;
        }

        .detail-sk-inner {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            width: 100%;
            max-width: 760px;
        }

        .sk-detail-inner > .detail-sk-inner {
            min-height: 100%;
        }

        .detail-pane.is-loading {
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .detail-pane.is-loading .detail-sk-inner {
            flex: 1;
            min-height: 0;
        }

        .detail-pane .article-wrap {
            max-width: 760px;
        }

        .detail-pane .article-title {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            margin: 0 0 12px;
            letter-spacing: -0.2px;
        }

        .detail-pane .article-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 12px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-pane .article-meta .source {
            font-weight: 600;
            color: var(--text-primary);
        }

        .detail-pane .article-body {
            font-size: 18px;
            line-height: 1.65;
            color: var(--text-primary);
        }

        .detail-pane .article-body p {
            margin: 0 0 1.15em;
        }

        .detail-pane .article-figure {
            margin: 28px 0;
            width: 100%;
        }

        .detail-pane .article-figure-frame {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: var(--radius-lg);
            background: var(--surface-container);
        }

        .detail-pane .article-figure-frame::before {
            content: "";
            display: block;
            width: 100%;
            padding-bottom: 56.25%;
        }

        .detail-pane .article-figure-img {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* 空态占位 */
        .detail-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 240px;
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* 竖版 Pad：视口变窄时仍为左右主从，收紧列表栏与间距 */
        @media (max-width: 900px) {
            :root {
                --demo-max-width: 800px;
                --list-pane-width: 320px;
                --spacing-h: 24px;
                --spacing-v: 20px;
            }

            html {
                background: var(--surface-container);
            }

            body {
                max-width: 100%;
                box-shadow: none;
            }

            .list-item-cover,
            .sk-list-cover {
                width: 96px;
                height: 72px;
            }

            .list-item-title {
                font-size: 15px;
            }

            .list-item-meta {
                font-size: 12px;
            }

            .detail-pane .article-title {
                font-size: 24px;
            }

            .detail-pane .article-body {
                font-size: 17px;
            }

            .detail-pane .article-meta {
                margin-bottom: 20px;
                padding-bottom: 16px;
            }

            .detail-pane .article-wrap,
            .detail-sk-inner,
            .sk-detail-inner {
                max-width: none;
            }

            .sk-detail-inner > .detail-sk-inner,
            .detail-pane.is-loading .detail-sk-inner {
                min-height: 100%;
            }
        }
    </style>
</head>

    <div class="master-detail">

            <div class="sk-list-pane">

    </div>

                    '<div class="sk sk-list-title"></div>' +
                    '<div class="sk sk-list-title short"></div>' +
                    '<div class="sk sk-list-meta"></div>' +
                    '</div>' +
                    '<div class="sk sk-list-cover"></div>' +
                    '</div>'
                );
            }

            function buildDetailSkeletonHtml() {
                var paraBlock = (
                    '<div class="sk sk-detail-para"></div>' +
                    '<div class="sk sk-detail-para mid"></div>' +
                    '<div class="sk sk-detail-para short"></div>'
                );
                return (
                    '<div class="detail-sk-inner" aria-hidden="true">' +
                    '<div class="sk sk-detail-title"></div>' +
                    '<div class="sk sk-detail-title line2"></div>' +
                    '<div class="sk sk-detail-meta"></div>' +
                    paraBlock +
                    '<div class="sk sk-detail-image"></div>' +
                    paraBlock +
                    paraBlock +
                    '<div class="sk sk-detail-fill"></div>' +
                    '</div>'
                );
            }

            function fillPageSkeleton() {
                var master = document.querySelector(".master-detail");
                var listInner = document.getElementById("sk-list-inner");
                var detailInner = document.getElementById("sk-detail-inner");
                if (!master || !listInner || !detailInner) {
                    return;
                }
                var paneH = master.clientHeight;
                var itemH = isCompactLayout() ? 100 : SK_LIST_ITEM_H;
                var listCount = Math.max(10, Math.ceil(paneH / itemH));
                var listHtml = "";
                for (var i = 0; i < listCount; i++) {
                    listHtml += skeletonListItemHtml();
                }
                listInner.innerHTML = listHtml;
                detailInner.innerHTML = buildDetailSkeletonHtml();
            }

            fillPageSkeleton();
            window.addEventListener("resize", fillPageSkeleton);
            if (typeof compactMq.addEventListener === "function") {
                compactMq.addEventListener("change", function () {
                    fillPageSkeleton();
                    window.requestAnimationFrame(ensureFillScreen);
                });
            } else if (typeof compactMq.addListener === "function") {
                compactMq.addListener(function () {
                    fillPageSkeleton();
                    window.requestAnimationFrame(ensureFillScreen);
                });
            }

            try {
                var params = new URLSearchParams(window.location.search);
                var q = params.get("lang");
                if (q === "zh" || q === "en") {
                    lang = q;
                    localStorage.setItem(STORAGE_KEY, lang);
                } else {
                    var s = localStorage.getItem(STORAGE_KEY);
                    if (s === "zh" || s === "en") {
                        lang = s;
                    }
                }
            } catch (e) {}

            function listCoverUrl(url) {
                return (url || "").replace(/w=\d+/g, "w=240").replace(/h=\d+/g, "h=180");
            }

            function hasMore() {
                return displayedCount < NEWS.length;
            }

            function buildItemHtml(entry) {
                var loc = getLocalizedArticle(entry, lang);
                var selected = entry.id === activeId ? " is-selected" : "";
                var meta = escapeHtml(loc.source) + " · " + escapeHtml(loc.timeLabel);
                return (
                    '<button type="button" class="list-item' + selected + '" data-id="' + entry.id + '" role="option" aria-selected="' + (entry.id === activeId) + '">' +
                    '<span class="list-item-body">' +
                    '<span class="list-item-title">' + escapeHtml(loc.title) + '</span>' +
                    '<span class="list-item-meta">' + meta + '</span>' +
                    '</span>' +
                    '<img src="' + escapeHtml(listCoverUrl(entry.cover)) + '" alt="" class="list-item-cover" loading="lazy">' +
                    '</button>'
                );
            }

            function updateFooter() {
                if (isLoading) {
                    listFooter.hidden = false;
                    listFooter.className = "list-load-footer is-loading";
                    listFooter.innerHTML =
                        '<div class="list-load-spinner" aria-hidden="true"></div>' +
                        '<span>' + (lang === "zh" ? "加载中…" : "Loading…") + '</span>';
                    return;
                }
                if (hasMore()) {
                    listFooter.hidden = true;
                    listFooter.innerHTML = "";
                    return;
                }
                if (displayedCount > 0) {
                    listFooter.hidden = false;
                    listFooter.className = "list-load-footer is-end";
                    listFooter.textContent = lang === "zh" ? "已加载全部资讯" : "All articles loaded";
                    return;
                }
                listFooter.hidden = true;
            }

            function syncSelection() {
                listRoot.querySelectorAll(".list-item[data-id]").forEach(function (btn) {
                    var id = Number(btn.getAttribute("data-id"));
                    var on = id === activeId;
                    btn.classList.toggle("is-selected", on);
                    btn.setAttribute("aria-selected", on ? "true" : "false");
                });
                if (isCompactLayout()) {
                    var selected = listRoot.querySelector(".list-item.is-selected");
                    if (selected) {
                        selected.scrollIntoView({ block: "nearest", behavior: "smooth" });
                    }
                }
            }

            function appendItems(entries) {
                if (!entries.length) {
                    return;
                }
                listRoot.insertAdjacentHTML("beforeend", entries.map(buildItemHtml).join(""));
            }

            function loadNextPage() {
                if (isLoading || !hasMore()) {
                    return;
                }
                isLoading = true;
                updateFooter();

                window.setTimeout(function () {
                    var next = NEWS.slice(displayedCount, displayedCount + PAGE_SIZE);
                    displayedCount += next.length;
                    appendItems(next);
                    isLoading = false;
                    updateFooter();
                    ensureFillScreen();
                }, LOAD_DELAY_MS);
            }

            function ensureFillScreen() {
                if (isLoading || !hasMore()) {
                    return;
                }
                if (listScroll.scrollHeight <= listScroll.clientHeight + SCROLL_THRESHOLD) {
                    loadNextPage();
                }
            }

            function onListScroll() {
                if (isLoading || !hasMore()) {
                    return;
                }
                var nearBottom =
                    listScroll.scrollTop + listScroll.clientHeight >=
                    listScroll.scrollHeight - SCROLL_THRESHOLD;
                if (nearBottom) {
                    loadNextPage();
                }
            }

            function showDetailLoading() {
                detailRoot.classList.add("is-loading");
                detailRoot.setAttribute("aria-busy", "true");
                detailRoot.innerHTML = buildDetailSkeletonHtml();
                detailRoot.scrollTop = 0;
            }

            function renderDetail(id) {
                var entry = findById(id);
                detailRoot.classList.remove("is-loading");
                detailRoot.setAttribute("aria-busy", "false");
                if (!entry) {
                    detailRoot.innerHTML = '<div class="detail-empty">Select an article</div>';
                    return;
                }
                detailRoot.innerHTML = buildArticleHtml(entry, lang);
                detailRoot.scrollTop = 0;
            }

            function selectArticle(id) {
                if (id === activeId) {
                    return;
                }
                activeId = id;
                syncSelection();
                showDetailLoading();

                detailLoadSeq += 1;
                var seq = detailLoadSeq;
                window.clearTimeout(detailLoadTimer);
                detailLoadTimer = window.setTimeout(function () {
                    if (seq !== detailLoadSeq) {
                        return;
                    }
                    renderDetail(id);
                }, DETAIL_LOAD_DELAY_MS);
            }

            listRoot.addEventListener("click", function (e) {
                var btn = e.target.closest(".list-item[data-id]");
                if (!btn || !listRoot.contains(btn)) {
                    return;
                }
                selectArticle(Number(btn.getAttribute("data-id")));
            });

            listScroll.addEventListener("scroll", onListScroll, { passive: true });

            function dismissSkeleton() {
                document.body.classList.remove("is-booting");
                var barSk = document.getElementById("app-bar-skeleton");
                var barTitle = document.getElementById("app-bar-title");
                var pageSk = document.getElementById("page-skeleton");
                if (barSk) {
                    barSk.hidden = true;
                }
                if (barTitle) {
                    barTitle.hidden = false;
                }
                if (pageSk) {
                    pageSk.setAttribute("aria-busy", "false");
                }
            }

            function bootApp() {
                dismissSkeleton();
                displayedCount = Math.min(PAGE_SIZE, NEWS.length);
                listRoot.innerHTML = NEWS.slice(0, displayedCount).map(buildItemHtml).join("");
                updateFooter();
                renderDetail(activeId);
                window.requestAnimationFrame(ensureFillScreen);
            }

            window.setTimeout(bootApp, BOOT_SKELETON_MS);
        })();
    </script>
</body>
</html>
