<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="News — article reading and related picks." id="metaDescription">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="format-detection" content="telephone=no, address=no, email=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta property="og:type" content="article" id="metaOgType">
    <meta property="og:site_name" content="AnySelected">
    <meta property="og:title" content="News" id="metaOgTitle">
    <meta property="og:description" content="" id="metaOgDescription">
    <meta property="og:image" content="" id="metaOgImage">
    <meta property="og:url" content="" id="metaOgUrl">
    <meta property="og:locale" content="en_US" id="metaOgLocale">
    <meta property="article:published_time" content="" id="metaArticleTime">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="News" id="metaTwitterTitle">
    <meta name="twitter:description" content="" id="metaTwitterDescription">
    <meta name="twitter:image" content="" id="metaTwitterImage">
    <link rel="canonical" href="" id="linkCanonical">
    <link rel="alternate" hreflang="zh-CN" href="" id="hreflangZh">
    <link rel="alternate" hreflang="en" href="" id="hreflangEn">
    <link rel="alternate" hreflang="x-default" href="" id="hreflangDefault">
    <title>AnySelected · Pad</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --border-color: #e5e5ea;
            --card-bg: #f2f2f7;
            --nav-bg: rgba(255, 255, 255, 0.85);
            --spacing-h: 16px;
            --spacing-v: 16px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --accent-blue: #007aff;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --demo-max-width: 1280px;
            --demo-frame-bg: #d4d4d8;
            --spacing-h: 32px;
            --app-bar-height: 64px;
            --touch-min: 48px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            display: flex;
            justify-content: center;
            min-height: 100%;
            background: var(--demo-frame-bg);
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            max-width: var(--demo-max-width);
            min-height: 100vh;
            position: relative;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding-bottom: calc(30px + var(--safe-bottom));
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.12);
        }

        @media (max-width: 1280px) {
            html {
                background: var(--bg-color);
            }

            body {
                box-shadow: none;
            }
        }

        /* 搜索与分类工具条吸顶（返回与标题由客户端 WebView 提供，不在此页） */
        .site-top {
            position: sticky;
            top: 0;
            z-index: 100;
            max-width: var(--demo-max-width);
            margin: 0 auto;
            background-color: var(--nav-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }

        /* 顶栏（返回 + 标题）由客户端 WebView 原生提供，网页不渲染该区域 */

        .detail-tools {
            padding: 12px var(--spacing-h) 14px;
        }

        .detail-tools[hidden] {
            display: none !important;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .search-box {
            flex: 1;
            min-width: 0;
            position: relative;
            display: flex;
            align-items: center;
            height: 36px;
            background-color: rgba(118, 118, 128, 0.12);
            border-radius: 10px;
            overflow: hidden;
        }

        .search-box-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .news-search-input {
            width: 100%;
            height: 100%;
            padding: 0 12px 0 34px;
            border: none;
            border-radius: 0;
            font-size: 15px;
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
            -webkit-appearance: none;
        }

        .news-search-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .news-search-input:focus {
            outline: none;
        }

        .search-box:focus-within {
            background-color: rgba(118, 118, 128, 0.18);
        }

        .search-lang-btn {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 36px;
            padding: 0 12px;
            margin: 0;
            border: none;
            border-radius: 10px;
            background-color: rgba(118, 118, 128, 0.12);
            color: var(--accent-blue);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            -webkit-appearance: none;
            transition: background-color 0.15s;
        }

        .search-lang-btn:active {
            background-color: rgba(118, 118, 128, 0.24);
        }

        .search-lang-btn .lang-globe {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .search-lang-btn .lang-arrow {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            margin-left: 1px;
            transition: transform 0.2s;
        }

        .search-lang-btn.is-open .lang-arrow {
            transform: rotate(180deg);
        }

        /* 语言选择遮罩 + 底部面板 */
        .lang-overlay {
            display: none;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: var(--demo-max-width);
            z-index: 9998;
            background-color: rgba(0, 0, 0, 0.35);
            -webkit-tap-highlight-color: transparent;
        }

        .lang-overlay.is-visible {
            display: block;
            animation: langFadeIn 0.18s ease-out;
        }

        .lang-sheet {
            display: none;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: var(--demo-max-width);
            z-index: 9999;
            max-height: 60vh;
            border-radius: 16px 16px 0 0;
            background-color: var(--bg-color);
            overflow: hidden;
            padding-bottom: var(--safe-bottom);
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.12);
        }

        .lang-sheet.is-visible {
            display: flex;
            flex-direction: column;
            animation: langSlideUp 0.25s cubic-bezier(0.32, 0.72, 0, 1);
        }

        @keyframes langFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes langSlideUp {
            from { transform: translateX(-50%) translateY(100%); }
            to { transform: translateX(-50%) translateY(0); }
        }

        .lang-sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .lang-sheet-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .lang-sheet-close {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background-color: rgba(118, 118, 128, 0.12);
            color: var(--text-secondary);
            cursor: pointer;
            -webkit-appearance: none;
            padding: 0;
        }

        .lang-sheet-close:active {
            background-color: rgba(118, 118, 128, 0.24);
        }

        .lang-sheet-list {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 6px 0;
        }

        .lang-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            margin: 0;
            border: none;
            width: 100%;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0.04);
        }

        .lang-option:active {
            background-color: var(--card-bg);
        }

        .lang-option-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .lang-option-native {
            font-weight: 500;
            font-size: 16px;
            line-height: 1.3;
        }

        .lang-option-en {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.3;
        }

        .lang-option-check {
            flex-shrink: 0;
            color: var(--accent-blue);
            display: none;
        }

        .lang-option.is-selected .lang-option-check {
            display: flex;
        }

        .lang-option.is-selected .lang-option-native {
            color: var(--accent-blue);
            font-weight: 600;
        }

        .category-scroll {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 2px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            flex-shrink: 0;
            padding: 7px 14px;
            margin: 0;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            font-family: inherit;
            cursor: pointer;
            -webkit-appearance: none;
        }

        .category-chip:active {
            opacity: 0.85;
        }

        .category-chip.is-active {
            background-color: var(--text-primary);
            color: #fff;
            border-color: var(--text-primary);
        }

        .search-results-panel {
            margin-top: 8px;
            max-height: min(42vh, 280px);
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: #fff;
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 10;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .search-results-panel[hidden] {
            display: none !important;
        }

        .search-result-item {
            display: block;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0.06);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:active {
            background-color: var(--card-bg);
        }

        .search-result-title {
            font-size: 15px;
            font-weight: 500;
            margin: 0 0 4px;
            line-height: 1.35;
        }

        .search-result-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 0;
        }

        .search-results-empty {
            padding: 14px;
            margin: 0;
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
        }

        .related-empty {
            margin: 0;
            padding: 8px 0 4px;
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.45;
        }

        .main-content {
            padding: 0 var(--spacing-h);
        }

        .article-wrap {
            padding: 0;
        }

        .article-header {
            margin: 0;
        }

        .article-title {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.3;
            margin: 16px 0 12px;
            letter-spacing: -0.2px;
        }

        .article-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 12px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .article-meta .source {
            font-weight: 600;
            color: var(--text-primary);
        }

        .article-body {
            font-size: 17px;
            line-height: 1.65;
            color: var(--text-primary);
        }

        .article-body p {
            margin: 0 0 1.15em;
        }

        .article-figure {
            margin: 20px 0;
            width: 100%;
            max-width: 100%;
        }

        .article-figure:first-child {
            margin-top: 0;
        }

        /* 横图：用比例盒强制 16:9（避免部分 WebView 下 img 的 aspect-ratio 被固有尺寸盖掉） */
        .article-figure-frame {
            position: relative;
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            border-radius: var(--radius-lg);
            background-color: var(--card-bg);
        }

        .article-figure-frame::before {
            content: "";
            display: block;
            width: 100%;
            padding-bottom: 56.25%;
        }

        .article-figure-img {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .related-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .related-heading {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 16px;
            color: var(--text-primary);
        }

        .related-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .related-item {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0.06);
        }

        .related-item:last-child {
            border-bottom: 1px solid var(--border-color);
        }

        .related-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 28px 0 8px;
        }

        .related-loading-spinner {
            width: 22px;
            height: 22px;
            border: 2.5px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: relSpin 0.8s linear infinite;
        }

        @keyframes relSpin {
            to { transform: rotate(360deg); }
        }

        .related-loading-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 分类新闻列表视图 */
        .cat-list-section {
            padding-top: 8px;
        }

        .cat-list-heading {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 4px;
            color: var(--text-primary);
        }

        .cat-list {
            display: flex;
            flex-direction: column;
        }

        .cat-list-item {
            display: flex;
            align-items: stretch;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0.06);
        }

        .cat-list-item:last-child {
            border-bottom: none;
        }

        .cat-list-item:active {
            opacity: 0.85;
        }

        .cat-list-cover {
            flex-shrink: 0;
            width: 88px;
            height: 88px;
            border-radius: var(--radius-md);
            object-fit: cover;
            background-color: var(--card-bg);
        }

        .cat-list-body {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .cat-list-title {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.35;
            margin: 0;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .cat-list-meta {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0;
        }

        .related-item:active {
            opacity: 0.85;
        }

        .related-info {
            flex: 1;
            padding-right: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }

        .related-title {
            font-size: 16px;
            line-height: 1.35;
            font-weight: 500;
            margin: 0 0 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .related-source {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0;
        }

        .related-cover {
            width: 88px;
            height: 88px;
            border-radius: var(--radius-md);
            object-fit: cover;
            flex-shrink: 0;
            background-color: var(--card-bg);
        }

        .error-state {
            padding: 48px var(--spacing-h);
            text-align: center;
            color: var(--text-secondary);
            font-size: 15px;
        }

        .error-state a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .site-footer {
            margin-top: 48px;
            padding: 0 var(--spacing-h) calc(20px + var(--safe-bottom));
        }

        .footer-inner {
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
        }

        .footer-bottom {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 4px 16px;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .footer-copyright {
            margin: 0;
        }

        .footer-home-link {
            color: inherit;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-home-link:active {
            color: var(--text-primary);
        }

        .footer-home-link:focus-visible {
            outline: 2px solid var(--accent-blue);
            outline-offset: 2px;
            border-radius: 2px;
        }

        .footer-legal {
            display: flex;
            gap: 12px;
        }

        .footer-legal a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 12px;
        }

        .footer-legal a:active {
            color: var(--text-primary);
        }

        .article-time {
            color: inherit;
        }

        /* 静态说明页（?page=）与 AnySelected 主页面统一排版 */
        .skip-link {
            position: absolute;
            left: 8px;
            top: 8px;
            z-index: 200;
            padding: 10px 14px;
            background: var(--text-primary);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            clip-path: inset(50%);
            height: 1px;
            width: 1px;
            overflow: hidden;
            white-space: nowrap;
        }

        .skip-link:focus {
            clip-path: none;
            height: auto;
            width: auto;
            overflow: visible;
            white-space: normal;
        }

        .article-header:not(:has(.article-meta)) {
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            padding-bottom: 4px;
        }

        .article-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin: -4px 0 16px;
            line-height: 1.45;
        }

        .article-body h2 {
            font-size: 18px;
            font-weight: 700;
            margin: 1.35em 0 0.65em;
            line-height: 1.35;
            color: var(--text-primary);
        }

        .article-body h2:first-child {
            margin-top: 0;
        }

        .article-body h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 1.2em 0 0.5em;
            line-height: 1.4;
        }

        .article-body ul,
        .article-body ol {
            margin: 0 0 1.15em;
            padding-left: 1.35em;
        }

        .article-body li {
            margin-bottom: 0.5em;
        }

        .article-body li > p {
            margin: 0 0 0.5em;
        }

        .article-body hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 1.5em 0;
        }

        .article-body a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
            word-break: break-word;
        }

        .article-body a:focus-visible {
            outline: 2px solid var(--accent-blue);
            outline-offset: 2px;
            border-radius: 2px;
        }

        .footer-legal a:focus-visible {
            outline: 2px solid var(--accent-blue);
            outline-offset: 2px;
            border-radius: 2px;
        }

        /* ===== Pad 布局（1280px · Android Tablet） ===== */
        body {
            font-family: Roboto, "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        .detail-tools {
            padding: 16px var(--spacing-h) 18px;
        }

        .search-box {
            height: var(--touch-min);
            border-radius: 12px;
        }

        .search-lang-btn {
            height: var(--touch-min);
            border-radius: 12px;
            padding: 0 16px;
        }

        .category-chip {
            padding: 10px 18px;
            font-size: 14px;
        }

        .cat-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 32px;
        }

        .cat-list-item {
            padding: 18px 0;
        }

        .cat-list-cover {
            width: 120px;
            height: 90px;
        }

        .cat-list-title {
            font-size: 18px;
        }

        .cat-list-heading {
            font-size: 22px;
            margin-bottom: 12px;
        }

        #mainContent:has(.related-section) {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 340px;
            gap: 32px;
            align-items: start;
            padding-top: 24px;
            max-width: 1180px;
            margin: 0 auto;
        }

        #mainContent:has(.related-section) .article-title {
            font-size: 28px;
        }

                                '<figure class="article-figure">' +
                                '<div class="article-figure-frame">' +
                                '<img class="article-figure-img" src="' +
                                escapeHtml(b.src) +
                                '" alt="' +
                                escapeHtml(alt) +
                                '" loading="lazy" decoding="async">' +
                                "</div>" +
                                "</figure>"
                            );
                        }
                        return "";
                    })
                    .join("");
            }

            function buildArticleHtml(entry, lang) {
                var loc = getLocalizedArticle(entry, lang);
                var bodyHtml = buildBlocksHtml(loc.blocks, loc.title);
                var pubIso = escapeHtml(entry.publishedTime || "");

                return (
                    '<article class="article-post">' +
                    '<div class="article-wrap">' +
                    '<header class="article-header">' +
                    '<h1 class="article-title">' +
                    escapeHtml(loc.title) +
                    "</h1>" +
                    '<div class="article-meta">' +
                    '<span class="source">' +
                    escapeHtml(loc.source) +
                    "</span>" +
                    '<time class="article-time" datetime="' +
                    pubIso +
                    '">' +
                    escapeHtml(loc.timeLabel) +
                    "</time>" +
                    "</div>" +
                    "</header>" +
                    '<div class="article-body">' +
                    bodyHtml +
                    "</div>" +
                    "</div>" +
                    "</article>"
                );
            }

            function buildRelatedHtml(currentId, lang) {
                var u = getUI(lang);
                var others = NEWS.filter(function (n) {
                    return n.id !== currentId;
                }).slice(0, 4);

                if (others.length === 0) {
                    return (
                        '<section id="relatedSectionRoot" class="article-wrap related-section" aria-labelledby="relatedHeading">' +
                        '<h2 class="related-heading" id="relatedHeading">' +
                        escapeHtml(u.related) +
                        "</h2>" +
                        '<p class="related-empty">' +
                        escapeHtml(u.relatedEmptyCategory) +
                        "</p>" +
                        "</section>"
                    );
                }

                var qs = langQuerySuffix(lang);
                var items = others
                    .map(function (n) {
                        var t = getLocalizedArticle(n, lang);
                        return (
                            '<a class="related-item" href="index.html?id=' +
                            n.id +
                            qs +
                            '">' +
                            '<div class="related-info">' +
                            '<h3 class="related-title">' +
                            escapeHtml(t.title) +
                            "</h3>" +
                            '<p class="related-source">' +
                            escapeHtml(t.source) +
                            "</p>" +
                            "</div>" +
                            '<img class="related-cover" src="' +
                            escapeHtml(n.cover) +
                            '" alt="' +
                            escapeHtml(t.title) +
                            '" width="200" height="200" loading="lazy">' +
                            "</a>"
                        );
                    })
                    .join("");

                return (
                    '<section id="relatedSectionRoot" class="article-wrap related-section" aria-labelledby="relatedHeading">' +
                    '<h2 class="related-heading" id="relatedHeading">' +
                    escapeHtml(u.related) +
                    "</h2>" +
                    '<div class="related-list">' +
                    items +
                    "</div>" +
                    '<div class="related-loading" aria-live="polite">' +
                    '<div class="related-loading-spinner"></div>' +
                    '<span class="related-loading-text">' +
                    escapeHtml(u.loadingMore) +
                    "</span>" +
                    "</div>" +
                    "</section>"
                );
            }

            function buildCategoryNewsListHtml(categoryId, lang) {
                var u = getUI(lang);
                var isAll = categoryId === "all";
                var filtered = NEWS.filter(function (n) {
                    return isAll || n.category === categoryId;
                });
                var catName = categoryLabel(categoryId, lang);
                var heading = isAll ? (lang === "zh" ? "全部资讯" : "All Articles") : catName;

                if (filtered.length === 0) {
                    return (
                        '<div class="cat-list-section">' +
                        '<h2 class="cat-list-heading">' + escapeHtml(heading) + "</h2>" +
                        '<p class="related-empty">' + escapeHtml(u.relatedEmptyCategory) + "</p>" +
                        "</div>"
                    );
                }

                var qs = langQuerySuffix(lang);
                var items = filtered.map(function (n) {
                    var t = getLocalizedArticle(n, lang);
                    return (
                        '<a class="cat-list-item" href="index.html?id=' + n.id + qs + '">' +
                        '<div class="cat-list-body">' +
                        '<h3 class="cat-list-title">' + escapeHtml(t.title) + "</h3>" +
                        '<p class="cat-list-meta">' + escapeHtml(t.source) + " · " + escapeHtml(t.timeLabel) + "</p>" +
                        "</div>" +
                        '<img class="cat-list-cover" src="' + escapeHtml(n.cover) +
                        '" alt="' + escapeHtml(t.title) + '" width="200" height="200" loading="lazy">' +
                        "</a>"
                    );
                }).join("");

                return (
                    '<div class="cat-list-section">' +
                    '<h2 class="cat-list-heading">' + escapeHtml(heading) + "</h2>" +
                    '<div class="cat-list">' + items + "</div>" +
                    '<div class="related-loading" aria-live="polite">' +
                    '<div class="related-loading-spinner"></div>' +
                    '<span class="related-loading-text">' + escapeHtml(u.loadingMore) + "</span>" +
                    "</div>" +
                    "</div>"
                );
            }

            function renderCategoryChips(lang) {
                var el = document.getElementById("categoryChips");
                if (!el) {
                    return;
                }
                el.setAttribute("aria-label", getUI(lang).categoryAria);
                el.innerHTML = CATEGORIES.map(function (cat) {
                    var active = browseState.categoryId === cat.id;
                    return (
                        '<button type="button" class="category-chip' +
                        (active ? " is-active" : "") +
                        '" data-category="' +
                        escapeHtml(cat.id) +
                        '" role="tab" aria-selected="' +
                        (active ? "true" : "false") +
                        '">' +
                        escapeHtml(cat.label[lang] || cat.label.en || cat.label.zh) +
                        "</button>"
                    );
                }).join("");
            }

            function buildSearchResultsHtml(query, lang, excludeArticleId) {
                var q = String(query || "")
                    .trim()
                    .toLowerCase();
                if (!q) {
                    return "";
                }
                var matches = NEWS.filter(function (n) {
                    if (excludeArticleId != null && n.id === excludeArticleId) {
                        return false;
                    }
                    var t = getLocalizedArticle(n, lang).title.toLowerCase();
                    return t.indexOf(q) !== -1;
                }).slice(0, 10);
                if (matches.length === 0) {
                    return (
                        '<p class="search-results-empty">' +
                        escapeHtml(getUI(lang).searchNoHit) +
                        "</p>"
                    );
                }
                var qs = langQuerySuffix(lang);
                return matches
                    .map(function (n) {
                        var t = getLocalizedArticle(n, lang);
                        return (
                            '<a class="search-result-item" href="index.html?id=' +
                            n.id +
                            qs +
                            '">' +
                            '<p class="search-result-title">' +
                            escapeHtml(t.title) +
                            "</p>" +
                            '<p class="search-result-meta">' +
                            escapeHtml(t.source) +
                            " · " +
                            escapeHtml(categoryLabel(n.category, lang)) +
                            "</p>" +
                            "</a>"
                        );
                    })
                    .join("");
            }

            function updateSearchPanel(lang, excludeArticleId) {
                var panel = document.getElementById("searchResultsPanel");
                var input = document.getElementById("newsSearchInput");
                if (!panel || !input) {
                    return;
                }
                var raw = input.value;
                if (!String(raw).trim()) {
                    panel.innerHTML = "";
                    panel.hidden = true;
                    return;
                }
                panel.hidden = false;
                panel.innerHTML = buildSearchResultsHtml(raw, lang, excludeArticleId);
            }

            function updateSiteFooter(lang, activeStaticKey) {
                activeStaticKey = activeStaticKey || null;
                var isZh = lang === "zh";
                var labels = {
                    accessibility: isZh ? "无障碍" : "Accessibility",
                    about: isZh ? "关于我们" : "About",
                    privacy: isZh ? "隐私政策" : "Privacy",
                    terms: isZh ? "服务条款" : "Terms"
                };
                var keys = ["accessibility", "about", "privacy", "terms"];
                var ids = ["footerAccessibility", "footerAbout", "footerPrivacy", "footerTerms"];
                var i;
                for (i = 0; i < keys.length; i++) {
                    var el = document.getElementById(ids[i]);
                    if (!el) {
                        continue;
                    }
                    el.textContent = labels[keys[i]];
                    el.href = staticPageHref(keys[i]);
                    if (activeStaticKey === keys[i]) {
                        el.setAttribute("aria-current", "page");
                    } else {
                        el.removeAttribute("aria-current");
                    }
                }

                var homeLink = document.getElementById("footerHomeLink");
                if (homeLink) {
                    homeLink.href = feedHomePath(lang);
                    homeLink.setAttribute(
                        "aria-label",
                        isZh ? "返回全部资讯首页 AnySelected.com" : "Home — all news AnySelected.com"
                    );
                }

                var sf = document.getElementById("siteFooter");
                if (sf) {
                    sf.setAttribute("lang", htmlLangAttr(lang));
                }
            }

            function render() {
                var lang = getLang();
                document.documentElement.lang = htmlLangAttr(lang);
                var skipLink = document.querySelector(".skip-link");
                if (skipLink) {
                    skipLink.textContent = lang === "zh" ? "跳到主要内容" : "Skip to main content";
                }
                var main = document.getElementById("mainContent");
                var langBtn = document.getElementById("langBtn");
                var u = getUI(lang);
                var lm = getLangMeta(lang);

                var langLabel = document.getElementById("langBtnLabel");
                if (langLabel) {
                    langLabel.textContent = lm.short;
                }
                if (langBtn) {
                    langBtn.setAttribute("aria-label", langSheetTitle(lang));
                }

                var listHref = feedHomePath(lang);

                var detailTools = document.getElementById("detailTools");
                var searchPanel = document.getElementById("searchResultsPanel");
                var searchInput = document.getElementById("newsSearchInput");

                var staticKey = getStaticPageKey();
                if (staticKey) {
                    renderState.lastArticleId = null;
                    browseState.categoryId = "all";
                    if (detailTools) {
                        detailTools.removeAttribute("hidden");
                    }
                    if (searchInput) {
                        searchInput.value = "";
                        searchInput.placeholder = getUI(lang).searchPlaceholder;
                        searchInput.setAttribute("aria-label", getUI(lang).searchAria);
                    }
                    if (searchPanel) {
                        searchPanel.innerHTML = "";
                        searchPanel.hidden = true;
                    }
                    closeLangSheet();
                    var sb = staticSeoBundle(staticKey, lang);
                    applyStandaloneSeoStatic(staticKey, lang);
                    document.title = sb.title + " · " + NAV_BRAND;
                    renderCategoryChips(lang);
                    main.innerHTML = cloneStaticTemplate(staticKey, lang);
                    updateSiteFooter(lang, staticKey);
                    window.scrollTo(0, 0);
                    return;
                }

                var articleId = getQueryId();

                if (articleId === null) {
                    renderState.lastArticleId = null;
                    var urlCat = getQueryCategoryId();
                    browseState.categoryId = urlCat || "all";
                    if (detailTools) {
                        detailTools.removeAttribute("hidden");
                    }
                    if (searchInput) {
                        searchInput.value = "";
                        searchInput.placeholder = getUI(lang).searchPlaceholder;
                        searchInput.setAttribute("aria-label", getUI(lang).searchAria);
                    }
                    if (searchPanel) {
                        searchPanel.innerHTML = "";
                        searchPanel.hidden = true;
                    }
                    closeLangSheet();
                    applyStandaloneSeoFeedHome(lang);
                    var feedTitle =
                        browseState.categoryId === "all"
                            ? lang === "zh"
                                ? "全部资讯"
                                : "All Articles"
                            : categoryLabel(browseState.categoryId, lang);
                    document.title = feedTitle + " · " + NAV_BRAND;
                    renderCategoryChips(lang);
                    main.innerHTML = buildCategoryNewsListHtml(browseState.categoryId, lang);
                    updateSiteFooter(lang, null);
                    window.scrollTo(0, 0);
                    return;
                }

                if (articleId === -1) {
                    renderState.lastArticleId = null;
                    if (detailTools) {
                        detailTools.setAttribute("hidden", "");
                    }
                    applyStandaloneSeoFallback(lang);
                    main.innerHTML =
                        '<div class="error-state">' +
                        escapeHtml(u.errNotFound) +
                        ' <a href="' +
                        escapeHtml(listHref) +
                        '">' +
                        escapeHtml(u.backToList) +
                        "</a></div>";
                    document.title = NAV_BRAND;
                    updateSiteFooter(lang, null);
                    return;
                }

                var entry = NEWS.find(function (n) {
                    return n.id === articleId;
                });

                if (!entry) {
                    renderState.lastArticleId = null;
                    if (detailTools) {
                        detailTools.setAttribute("hidden", "");
                    }
                    applyStandaloneSeoFallback(lang);
                    main.innerHTML =
                        '<div class="error-state">' +
                        escapeHtml(u.errNotFound) +
                        ' <a href="' +
                        escapeHtml(listHref) +
                        '">' +
                        escapeHtml(u.backToList) +
                        "</a></div>";
                    document.title = NAV_BRAND;
                    updateSiteFooter(lang, null);
                    return;
                }

                if (detailTools) {
                    detailTools.removeAttribute("hidden");
                }
                if (searchInput) {
                    searchInput.value = "";
                    searchInput.placeholder = getUI(lang).searchPlaceholder;
                    searchInput.setAttribute("aria-label", getUI(lang).searchAria);
                }
                if (searchPanel) {
                    searchPanel.innerHTML = "";
                    searchPanel.hidden = true;
                }

                if (renderState.lastArticleId !== entry.id) {
                    browseState.categoryId = null;
                }
                renderState.lastArticleId = entry.id;

                var loc = getLocalizedArticle(entry, lang);
                applyStandaloneSeoArticle(entry, lang, loc);
                document.title = loc.title + " · " + NAV_BRAND;
                renderCategoryChips(lang);

                if (browseState.categoryId) {
                    main.innerHTML = buildCategoryNewsListHtml(browseState.categoryId, lang);
                } else {
                    main.innerHTML =
                        buildArticleHtml(entry, lang) +
                        buildRelatedHtml(entry.id, lang);
                }
                updateSiteFooter(lang, null);
            }

            document.getElementById("langBtn").addEventListener("click", function () {
                openLangSheet();
            });

            document.getElementById("langOverlay").addEventListener("click", function () {
                closeLangSheet();
            });

            document.getElementById("langSheetClose").addEventListener("click", function () {
                closeLangSheet();
            });

            document.getElementById("langSheetList").addEventListener("click", function (e) {
                var btn = e.target.closest(".lang-option");
                if (!btn) {
                    return;
                }
                var chosen = btn.getAttribute("data-lang");
                if (!chosen || !isValidLang(chosen)) {
                    return;
                }
                closeLangSheet();
                if (chosen !== getLang()) {
                    setLang(chosen);
                    render();
                }
            });

            var searchTimer;
            var newsSearchInput = document.getElementById("newsSearchInput");
            if (newsSearchInput) {
                newsSearchInput.addEventListener("input", function () {
                    clearTimeout(searchTimer);
                    searchTimer = setTimeout(function () {
                        updateSearchPanel(getLang(), getQueryId());
                    }, 220);
                });
            }

            var detailToolsEl = document.getElementById("detailTools");
            if (detailToolsEl) {
                detailToolsEl.addEventListener("click", function (e) {
                    var btn = e.target.closest(".category-chip");
                    if (!btn || !detailToolsEl.contains(btn)) {
                        return;
                    }
                    var cat = btn.getAttribute("data-category");
                    if (!cat) {
                        return;
                    }
                    if (getStaticPageKey()) {
                        window.location.href = buildFeedUrlWithCat(getLang(), cat);
                        return;
                    }

                    browseState.categoryId = browseState.categoryId === cat ? null : cat;
                    var lang = getLang();
                    var main = document.getElementById("mainContent");
                    var id = getQueryId() || (NEWS.length > 0 ? NEWS[0].id : null);
                    var entry = id != null ? NEWS.find(function (n) { return n.id === id; }) : null;

                    if (browseState.categoryId) {
                        main.innerHTML = buildCategoryNewsListHtml(browseState.categoryId, lang);
                    } else if (entry) {
                        main.innerHTML =
                            buildArticleHtml(entry, lang) +
                            buildRelatedHtml(entry.id, lang);
                    } else {
                        browseState.categoryId = "all";
                        main.innerHTML = buildCategoryNewsListHtml("all", lang);
                    }
                    renderCategoryChips(lang);
                    window.scrollTo({ top: 0, behavior: "smooth" });
                });
            }

            render();
        })();
    </script>
</body>
</html>
