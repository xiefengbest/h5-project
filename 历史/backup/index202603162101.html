<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AnyWP - Library</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --bg-page: #ffffff;
            --text-primary: #1c1c1e;
            --text-secondary: #6e6e73;
            --card-bg: #ffffff;
            --card-bg-secondary: #e5e5ea;
            --border-subtle: rgba(0, 0, 0, 0.08);
            --card-radius: 24px;
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0b0b0b;
                --bg-page: #000000;
                --text-primary: #ffffff;
                --text-secondary: #8e8e93;
                --card-bg: #1c1c1e;
                --card-bg-secondary: #2c2c2e;
                --border-subtle: rgba(255, 255, 255, 0.08);
            }
            body {
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            display: flex;
            justify-content: center;
            min-height: 100%;
            background: var(--bg-color);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.4;
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.15);
        }

        .container {
            padding: 0 16px calc(var(--safe-area-bottom) + 20px);
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* 统一导航栏规范 */
        .nav-header {
            height: 44px;
            padding: calc(var(--safe-area-top) + 10px) 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            position: relative;
            z-index: 100;
            width: 100%;
        }

        /* 首页 Header */
        .header {
            margin-bottom: 25px;
            padding-left: 0;
            padding-right: 0;
        }

        .tabs {
            display: flex;
            gap: 20px;
            align-items: center;
            height: 44px;
        }

        .tab-item {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.5;
            line-height: 44px;
        }

        .tab-item.active {
            color: var(--text-primary);
            opacity: 1;
            transform: scale(1.05);
        }

        .header-settings {
            width: 24px;
            height: 44px;
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 详情页 Header */
        .detail-header {
            position: sticky;
            top: 0;
            background: var(--bg-page);
            margin-bottom: 25px;
            width: 100%;
            left: 0;
            z-index: 10;
        }

        .back-icon {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            height: 44px;
        }

        .wallpapers-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
            font-size: 14px;
            opacity: 0.7;
            height: 44px;
        }

        /* 全屏预览 Header */
        .preview-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: transparent;
        }

        .preview-back {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            color: #fff;
            cursor: pointer;
        }

        /* Date Section */
        .date-section {
            margin-bottom: 20px;
            padding-left: 4px;
            margin-top: 20px;
        }

        .date-day {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .date-month {
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* Grid Layout */
        .wallpaper-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 40px;
        }

        .wallpaper-card {
            position: relative;
            aspect-ratio: 9 / 16;
            border-radius: var(--card-radius);
            overflow: hidden;
            background-color: var(--card-bg-secondary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .wallpaper-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, opacity 0.5s ease;
            opacity: 0;
        }

        .wallpaper-img.loaded {
            opacity: 1;
        }

        .wallpaper-card:active .wallpaper-img {
            transform: scale(0.98);
        }

        .wallpaper-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            z-index: 2;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
        }

        /* 可点击文案通用样式优化 */
        .clickable-news-title {
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .clickable-news-title:active {
            opacity: 0.7;
        }

        /* 首页和全屏预览页：深色背景上的文案 */
        .wallpaper-name.clickable-news-title,
        .preview-title.clickable-news-title,
        .detail-hero-title.clickable-news-title {
            color: #ffffff !important;
            border-bottom: none;
            padding-bottom: 0;
            text-decoration: none;
            display: flex;
            align-items: center;
            width: 100%;
            overflow: hidden;
        }

        /* 确保首页/预览页文案中的 span 处理省略号，箭头不被挤压 */
        .wallpaper-name.clickable-news-title span,
        .preview-title.clickable-news-title span,
        .detail-hero-title.clickable-news-title span {
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            white-space: normal;
        }

        /* 详情页下方推荐：卡片背景上的文案 */
        .detail-card-title.clickable-news-title {
            color: var(--text-primary) !important;
            border-bottom: none;
            padding-bottom: 0;
            text-decoration: none;
            display: flex;
            align-items: center;
            width: 100%;
            overflow: hidden;
        }

        /* 确保详情页下方卡片文案中的 span 处理省略号，箭头不被挤压 */
        .detail-card-title.clickable-news-title span {
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            white-space: normal;
        }

        .wallpaper-name.clickable-news-title .news-arrow-icon,
        .preview-title.clickable-news-title .news-arrow-icon,
        .detail-hero-title.clickable-news-title .news-arrow-icon,
        .detail-card-title.clickable-news-title .news-arrow-icon {
            flex-shrink: 0;
            margin-left: 8px;
        }

        /* 箭头图标样式 */
        .news-arrow-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        /* 卡片背景上的箭头样式 */
        .detail-card-title.clickable-news-title .news-arrow-icon {
            background: var(--border-subtle);
            color: var(--text-primary);
        }

        .news-arrow-icon svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
        }

        .wallpaper-name {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        /* 详情页样式 */
        .detail-page {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 390px;
            background: var(--bg-page);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .detail-hero-container {
            padding: 0 60px; /* 进一步增加左右间距，使图片更小 */
            margin-bottom: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        .detail-hero {
            width: 100%;
            aspect-ratio: 9 / 16;
            position: relative;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .detail-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-hero-info {
            position: absolute;
            bottom: 24px;
            left: 20px;
            right: 20px;
            z-index: 2;
            cursor: pointer;
        }

        .detail-hero-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.3;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .detail-main-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .detail-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
        }

        .detail-stat svg {
            opacity: 0.9;
        }

        .action-save-btn {
            background: var(--text-primary);
            color: var(--bg-page);
            padding: 10px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        /* 全屏预览样式 */
        .preview-page {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 390px;
            background: var(--bg-page);
            z-index: 2000;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-footer {
            position: absolute;
            bottom: calc(var(--safe-area-bottom) + 30px);
            left: 20px;
            right: 20px;
            z-index: 2010;
        }

        .preview-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 24px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .preview-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
        }

        .preview-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            color: #fff;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }

        .detail-content {
            background: var(--bg-page);
            padding: 0 16px 40px;
        }

        .detail-content-header {
            padding: 0 0 14px;
        }

        .detail-content-title {
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 700;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .detail-card {
            border-radius: 20px;
            overflow: hidden;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
        }

        .detail-card-img {
            width: 100%;
            aspect-ratio: 4 / 5;
            object-fit: cover;
        }

        .detail-card-footer {
            padding: 12px;
            background: var(--card-bg);
        }

        .detail-card-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .detail-card-title:hover {
            text-decoration: underline;
        }

        .detail-card-meta {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Banner Ad */
        .ad-banner {
            grid-column: 1 / -1;
            background: var(--card-bg-secondary);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            margin: 8px 0;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
        }

        .ad-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.4);
            color: rgba(255, 255, 255, 0.7);
            font-size: 10px;
            padding: 4px 8px;
            border-bottom-left-radius: 12px;
            backdrop-filter: blur(5px);
            z-index: 10;
            pointer-events: none;
        }

        .ad-banner.ad-image-only {
            padding: 0;
            border: none;
            position: relative;
        }

        .ad-banner.ad-image-only .ad-full-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            z-index: 1;
        }

        .ad-banner.ad-image-only .ad-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            pointer-events: none;
            z-index: 2;
        }

        .ad-banner.ad-small {
            aspect-ratio: 320 / 100;
        }

        .ad-banner.ad-large {
            aspect-ratio: 320 / 250;
        }

        /* Native Ad - Grid Card (首页瀑布流) */
        .native-ad-card {
            position: relative;
            aspect-ratio: 9 / 16;
            border-radius: var(--card-radius);
            overflow: hidden;
            background-color: var(--card-bg-secondary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            cursor: pointer;
        }

        .native-ad-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(24px) brightness(0.55);
            transform: scale(1.15);
            z-index: 0;
        }

        .native-ad-media {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(calc(-50% - 24px));
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            z-index: 1;
        }

        .native-ad-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.55);
            color: rgba(255, 255, 255, 0.85);
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            backdrop-filter: blur(6px);
            z-index: 5;
            letter-spacing: 0.5px;
        }

        .native-ad-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            padding: 36px 14px 14px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 55%, transparent 100%);
        }

        .native-ad-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .native-ad-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .native-ad-text {
            flex: 1;
            min-width: 0;
        }

        .native-ad-name {
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .native-ad-publisher {
            color: rgba(255, 255, 255, 0.55);
            font-size: 10px;
            margin-top: 1px;
        }

        .native-ad-stars {
            display: flex;
            align-items: center;
            gap: 1px;
            margin-bottom: 10px;
        }

        .native-ad-stars svg {
            width: 10px;
            height: 10px;
        }

        .native-ad-stars .ad-rating {
            color: rgba(255, 255, 255, 0.6);
            font-size: 10px;
            font-weight: 500;
            margin-left: 4px;
        }

        .native-ad-stars .ad-downloads {
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            margin-left: 6px;
        }

        .native-ad-cta {
            width: 100%;
            padding: 9px;
            border: none;
            border-radius: 10px;
            background: #34C759;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Native Ad - Detail Recommend Card (详情页推荐位) */
        .detail-ad-card {
            border-radius: 20px;
            overflow: hidden;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
        }

        .detail-ad-media-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 5;
            overflow: hidden;
            background: var(--card-bg-secondary);
        }

        .detail-ad-media-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(20px) brightness(0.5);
            transform: scale(1.15);
            z-index: 0;
        }

        .detail-ad-media-img {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            z-index: 1;
        }

        .detail-ad-media-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.5);
            color: rgba(255, 255, 255, 0.8);
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            z-index: 5;
        }

        .detail-ad-footer {
            padding: 12px;
            background: var(--card-bg);
        }

        .detail-ad-footer-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .detail-ad-footer-icon {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .detail-ad-footer-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .detail-ad-footer-cta {
            width: 100%;
            padding: 7px;
            border: none;
            border-radius: 8px;
            background: #34C759;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* ===== 入口1: 轮播流中的资讯全屏卡 ===== */
        .carousel-news-slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 32px 24px;
            text-align: center;
            z-index: 1;
        }

        .carousel-news-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            max-width: 100%;
        }

        .carousel-news-tag {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            letter-spacing: 1px;
        }

        .carousel-news-title {
            color: #fff;
            font-size: 20px;
            font-weight: 800;
            line-height: 1.4;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }

        .carousel-news-summary {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            line-height: 1.6;
            max-width: 90%;
        }

        .carousel-news-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 10px 28px;
            background: #fff;
            color: #1c1c1e;
            font-size: 14px;
            font-weight: 700;
            border-radius: 24px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .carousel-news-btn:active {
            transform: scale(0.95);
        }


        /* ===== 入口2: 资讯推荐区（替代 Banner 广告位） ===== */
        .detail-news-section {
            padding: 0 16px 16px;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 8px;
        }

        .news-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .news-section-title {
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 700;
        }

        .news-section-more {
            color: var(--text-secondary);

            { id: 195, title: "火星移民计划：SpaceX 星舰首次载人绕火星飞行圆满成功" }
        ];

        const dates = [
            { day: "今日精选", month: "2026年1月31日" },
            { day: "往期推荐", month: "2026年1月30日" },
            { day: "经典回顾", month: "2026年1月29日" }
        ];

        const newsGradients = [
            'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',
            'linear-gradient(135deg, #1b2838 0%, #0d4b4e 50%, #0a6e5c 100%)',
            'linear-gradient(135deg, #2d1b3d 0%, #4a1942 50%, #801336 100%)',
            'linear-gradient(135deg, #1a1a2e 0%, #3d2c5e 50%, #6b3fa0 100%)',
            'linear-gradient(135deg, #1c2333 0%, #2c3e6b 50%, #3a7bd5 100%)',
        ];

        /**
         * 资讯位云端配置（实际由服务端接口 /api/news-slot/config 下发）
         * - carousel: 轮播流中资讯卡插入策略
         * - section:  详情页资讯推荐区配置
         * - grid:     推荐网格中资讯卡配置
         * - items:    资讯内容池（服务端根据用户画像、地域、时间等动态返回）
         */
        const newsSlotConfig = {
            carousel: { enabled: true, positions: [4, 8, 12] },
            section:  { enabled: true },
            grid:     { enabled: true, positions: [4, 7] },
            items: newsData.map(n => ({
                id: n.id,
                title: n.title,
                url: `https://example.com/news/${n.id}`,
                thumb: `https://picsum.photos/id/${n.id}/400/220`
            }))
        };

        let carouselItems = [];
        let carouselIndex = 0;
        let touchStartX = 0;
        let touchStartY = 0;
        let isSwiping = false;

        function buildCarousel(startNewsId) {
            carouselItems = [];
            const c = newsSlotConfig.carousel;
            const positionsSet = new Set(Array.isArray(c.positions) ? c.positions : [4, 8, 12]);
            const slotItems = newsSlotConfig.items;
            const totalSlots = newsData.length + positionsSet.size;
            let wpIdx = 0;
            let newsSlotIdx = 0;
            for (let pos = 1; pos <= totalSlots; pos++) {
                if (c.enabled && positionsSet.has(pos)) {
                    const article = slotItems[newsSlotIdx % slotItems.length];
                    carouselItems.push({
                        type: 'news',
                        id: article.id,
                        title: article.title,
                        url: article.url,
                        gradient: newsGradients[newsSlotIdx % newsGradients.length]
                    });
                    newsSlotIdx++;
                } else {
                    const news = newsData[wpIdx++];
                    carouselItems.push({
                        type: 'wallpaper',
                        id: news.id,
                        title: news.title,
                        imgSrc: `https://picsum.photos/id/${news.id}/400/800`
                    });
                }
            }
            const id = startNewsId != null ? Number(startNewsId) : null;
            carouselIndex = carouselItems.findIndex(item => item.type === 'wallpaper' && Number(item.id) === id);
            if (carouselIndex === -1) carouselIndex = 0;
        }

        function renderCarouselItem() {
            const item = carouselItems[carouselIndex];
            const hero = document.getElementById('detailHero');
            const actions = document.querySelector('.detail-main-actions');
            if (!item || !hero) return;

            if (item.type === 'wallpaper') {
                hero.onclick = () => openPreview();
                hero.innerHTML = `
                    <img id="detail-img" src="${item.imgSrc}" alt="">
                    <div class="detail-hero-info">
                        <p id="detail-title" class="detail-hero-title clickable-news-title"
                           onclick="event.stopPropagation(); location.href='https://example.com/news/${item.id}'">
                            <span>${item.title}</span>
                        </p>
                    </div>
                `;
                actions.style.display = 'flex';
                document.getElementById('detail-page').dataset.currentNewsId = item.id;
            } else {
                hero.onclick = null;
                hero.innerHTML = `
                    <div class="carousel-news-slide" style="background: ${item.gradient}">
                        <div class="carousel-news-content">
                            <span class="carousel-news-tag">热点资讯</span>
                            <h2 class="carousel-news-title">${item.title}</h2>
                            <p class="carousel-news-summary">点击查看完整报道，了解更多精彩内容</p>
                            <a class="carousel-news-btn" onclick="event.stopPropagation(); location.href='${item.url || ('https://example.com/news/' + item.id)}'">查看详情</a>
                        </div>
                    </div>
                `;
                actions.style.display = 'none';
            }

            renderNewsSection();
            renderDetailGrid();
        }


        // 资讯推荐区内容由云端 newsSlotConfig.section 控制
        function renderNewsSection() {
            const section = document.getElementById('detailNewsSection');
            if (!newsSlotConfig.section.enabled) { section.innerHTML = ''; return; }
            const slotItems = newsSlotConfig.items;
            const count = 5;
            const offset = (carouselIndex * 3) % slotItems.length;
            const items = [];
            for (let i = 0; i < count; i++) {
                items.push(slotItems[(offset + i) % slotItems.length]);
            }

            section.innerHTML = `
                <div class="news-section-header">
                    <span class="news-section-title">热点资讯</span>
                    <a class="news-section-more" href="https://example.com/news" onclick="event.preventDefault(); location.href='https://example.com/news'">更多 ></a>
                </div>
                <div class="news-section-scroll">
                    ${items.map(n => `
                        <a class="news-section-card" onclick="location.href='${n.url}'">
                            <img class="news-card-thumb" src="${n.thumb}" alt="" loading="lazy">
                            <span class="news-card-title">${n.title}</span>
                        </a>
                    `).join('')}
                </div>
            `;
        }

        function renderWallpaperCard(w) {
            return `
                <div class="detail-card" onclick="openDetail(null, null, ${w.id})">
                    <img class="detail-card-img" src="https://picsum.photos/id/${w.id}/400/500" alt="" loading="lazy">
                    <div class="detail-card-footer">
                        <p class="detail-card-title clickable-news-title"
                           onclick="event.stopPropagation(); location.href='https://example.com/news/${w.id}'">
                            <span>${w.title}</span>
                            <div class="news-arrow-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                            </div>
                        </p>
                        <div class="detail-card-meta">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            1.9W
                        </div>
                    </div>
                </div>`;
        }

        // 推荐网格中的资讯卡由云端 newsSlotConfig.grid.positions 控制：第几个格子出资讯卡
        function renderDetailGrid() {
            const grid = document.getElementById('detailGrid');
            const offset = (carouselIndex * 2 + 5) % newsData.length;
            const wallpapers = [];
            for (let i = 0; i < 8; i++) {
                wallpapers.push(newsData[(offset + i) % newsData.length]);
            }
            const slotItems = newsSlotConfig.items;
            const g = newsSlotConfig.grid;
            const positionsSet = new Set(Array.isArray(g.positions) ? g.positions : [4, 7]);
            const cells = [];
            let wpIdx = 0;
            let newsIdx = 0;
            for (let pos = 1; pos <= 9; pos++) {
                if (pos === 1) {
                    cells.push({ type: 'ad' });
                } else {
                    const isNews = g.enabled && positionsSet.has(pos);
                    if (isNews) {
                        const article = slotItems[(offset + 11 + newsIdx) % slotItems.length];
                        const gradient = newsGradients[(carouselIndex + 2 + newsIdx) % newsGradients.length];
                        cells.push({ type: 'news', article, gradient });
                        newsIdx++;
                    } else {
                        cells.push({ type: 'wallpaper', w: wallpapers[wpIdx++] });
                    }
                }
            }
            grid.innerHTML = cells.map(c => {
                if (c.type === 'ad') {
                    return `<div class="detail-ad-card">
                        <div class="detail-ad-media-wrap">
                            <img class="detail-ad-media-bg" src="https://picsum.photos/id/96/600/600" alt="">
                            <img class="detail-ad-media-img" src="https://picsum.photos/id/96/600/600" alt="">
                            <div class="detail-ad-media-badge">Ad</div>
                        </div>
                        <div class="detail-ad-footer">
                            <div class="detail-ad-footer-row">
                                <img class="detail-ad-footer-icon" src="https://picsum.photos/id/60/96/96" alt="">
                                <span class="detail-ad-footer-name">Wanderlust Travel</span>
                            </div>
                            <button class="detail-ad-footer-cta">Install</button>
                        </div>
                    </div>`;
                }
                if (c.type === 'news') {
                    return `<div class="detail-news-card" style="background: ${c.gradient}" onclick="location.href='${c.article.url}'">
                        <div class="detail-news-card-body">
                            <span class="detail-news-tag" style="background: rgba(255,255,255,0.2); color: #fff;">热点资讯</span>
                            <h3 class="detail-news-headline" style="color: #fff;">${c.article.title}</h3>
                        </div>
                        <div class="detail-news-card-footer">
                            <span class="detail-news-cta" style="color: rgba(255,255,255,0.7);">阅读全文 ></span>
                        </div>
                    </div>`;
                }
                return renderWallpaperCard(c.w);
            }).join('');
        }

        function setupCarouselTouch() {
            const container = document.getElementById('heroContainer');
            container.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                isSwiping = false;
            }, { passive: true });

            container.addEventListener('touchmove', (e) => {
                const dx = Math.abs(e.touches[0].clientX - touchStartX);
                const dy = Math.abs(e.touches[0].clientY - touchStartY);
                if (dx > dy && dx > 10) isSwiping = true;
            }, { passive: true });

            container.addEventListener('touchend', (e) => {
                if (!isSwiping) return;
                const dx = e.changedTouches[0].clientX - touchStartX;
                if (Math.abs(dx) < 50) return;
                if (dx < 0 && carouselIndex < carouselItems.length - 1) {
                    carouselIndex++;
                    renderCarouselItem();
                } else if (dx > 0 && carouselIndex > 0) {
                    carouselIndex--;
                    renderCarouselItem();
                }
            }, { passive: true });
        }

        function openDetail(imgSrc, title, newsId) {
            const detailPage = document.getElementById('detail-page');
            buildCarousel(newsId);
            renderCarouselItem();
            detailPage.style.display = 'flex';
            detailPage.scrollTop = 0;
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            document.getElementById('detail-page').style.display = 'none';
            document.body.style.overflow = '';
        }

        function openPreview() {
            const item = carouselItems[carouselIndex];
            if (!item || item.type !== 'wallpaper') return;

            document.getElementById('preview-img').src = item.imgSrc;
            document.getElementById('preview-title').innerHTML = `
                <span>${item.title}</span>
            `;
            document.getElementById('preview-title').onclick = (e) => {
                e.stopPropagation();
                location.href = `https://example.com/news/${item.id}`;
            };
            document.getElementById('preview-page').style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('preview-page').style.display = 'none';
        }

        function generateContent() {
            const root = document.getElementById('content-root');

            dates.forEach((date, dateIdx) => {
                const section = document.createElement('section');
                section.className = 'date-section';
                section.innerHTML = `
                    <p class="date-day">${date.day}</p>
                    <p class="date-month">${date.month}</p>
                `;
                root.appendChild(section);

                const grid = document.createElement('main');
                grid.className = 'wallpaper-grid';

                for (let i = 0; i < 10; i++) {
                    if (dateIdx === 0 && i === 0) {
                        const adCard = document.createElement('div');
                        adCard.className = 'native-ad-card';
                        adCard.innerHTML = `
                            <img class="native-ad-bg" src="https://picsum.photos/id/96/600/600" alt="">
                            <img class="native-ad-media" src="https://picsum.photos/id/96/600/600" alt="">
                            <div class="native-ad-badge">Ad</div>
                            <div class="native-ad-info">
                                <div class="native-ad-row">
                                    <img class="native-ad-icon" src="https://picsum.photos/id/60/96/96" alt="">
                                    <div class="native-ad-text">
                                        <div class="native-ad-name">Wanderlust Travel</div>
                                        <div class="native-ad-publisher">Wanderlust Inc.</div>
                                    </div>
                                </div>
                                <div class="native-ad-stars">
                                    <svg viewBox="0 0 24 24" fill="#FFCA28" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
                                    <svg viewBox="0 0 24 24" fill="#FFCA28" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
                                    <svg viewBox="0 0 24 24" fill="#FFCA28" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
                                    <svg viewBox="0 0 24 24" fill="#FFCA28" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
                                    <svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.25)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
                                    <span class="ad-rating">4.5</span>
                                    <span class="ad-downloads">10M+</span>
                                </div>
                                <button class="native-ad-cta">Install</button>
                            </div>
                        `;
                        grid.appendChild(adCard);
                        continue;
                    }

                    const newsIdx = (dateIdx * 10 + i) % newsData.length;
                    const news = newsData[newsIdx];
                    const imgSrc = `https://picsum.photos/id/${news.id}/400/800`;

                    const card = document.createElement('div');
                    card.className = 'wallpaper-card';
                    card.onclick = () => openDetail(imgSrc, news.title, news.id);

                    card.innerHTML = `
                        <img class="wallpaper-img" loading="lazy" src="${imgSrc}" alt="${news.title}" onload="this.classList.add('loaded')">
                        <div class="wallpaper-info">
                            <div class="wallpaper-name clickable-news-title" onclick="event.stopPropagation(); location.href='https://example.com/news/${news.id}'">
                                <span>${news.title}</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                }
                root.appendChild(grid);
            });
        }

        generateContent();
        setupCarouselTouch();
    </script>
</body>
</html>
