<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AnyWP - Recommend</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --card-radius: 24px;
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.4;
        }

        .container {
            padding: 0 16px calc(var(--safe-area-bottom) + 20px);
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .nav-header {
            height: 44px;
            padding: calc(var(--safe-area-top) + 10px) 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            position: relative;
            z-index: 100;
            width: 100%;
        }

        .header {
            margin-bottom: 25px;
            padding-left: 0;
            padding-right: 0;
        }

        .tabs {
            display: flex;
            gap: 20px;
            align-items: center;
            height: 44px;
        }

        .tab-item {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.5;
            line-height: 44px;
        }

        .tab-item.active {
            color: var(--text-primary);
            opacity: 1;
            transform: scale(1.05);
        }

        .header-settings {
            width: 24px;
            height: 44px;
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .date-section {
            margin-bottom: 20px;
            padding-left: 4px;
            margin-top: 20px;
        }

        .date-day {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .date-month {
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .wallpaper-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 40px;
        }

        .wallpaper-card {
            position: relative;
            aspect-ratio: 9 / 19;
            border-radius: var(--card-radius);
            overflow: hidden;
            background-color: #1c1c1e;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .wallpaper-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, opacity 0.5s ease;
            opacity: 0;
        }

        .wallpaper-img.loaded {
            opacity: 1;
        }

        .wallpaper-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            z-index: 2;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
        }

        .clickable-news-title {
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .wallpaper-name.clickable-news-title {
            color: #ffffff !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            width: 100%;
            overflow: hidden;
        }

        .wallpaper-name.clickable-news-title span {
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            white-space: normal;
        }

        .news-arrow-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .news-arrow-icon svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
        }

        .wallpaper-name {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.4;
        }

        .ad-banner {
            grid-column: 1 / -1;
            background: #1c1c1e;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            margin: 8px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .ad-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.4);
            color: rgba(255, 255, 255, 0.7);
            font-size: 10px;
            padding: 4px 8px;
            border-bottom-left-radius: 12px;
            backdrop-filter: blur(5px);
            z-index: 10;
            pointer-events: none;
        }

        .ad-banner.ad-image-only {
            padding: 0;
            border: none;
            position: relative;
        }

        .ad-banner.ad-image-only .ad-full-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            z-index: 1;
        }

        .ad-banner.ad-image-only .ad-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            pointer-events: none;
            z-index: 2;
        }

        .ad-banner.ad-small { aspect-ratio: 320 / 100; }
        .ad-banner.ad-large { aspect-ratio: 320 / 250; }

    </style>
</head>
<body>
    <div class="container" id="content-root">
        <header class="header nav-header">
            <nav class="tabs">
                <div class="tab-item active">推荐</div>
                <div class="tab-item">图库</div>
            </nav>
            <div class="header-settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </div>
        </header>
    </div>

    <script>
        const newsData = [
            { id: 10, title: "莫奈花园：探索印象派大师笔下的色彩美学与自然光影" },
            { id: 28, title: "全球变暖下的极端气候：为何今年的落日余晖显得格外绚丽？" },
            { id: 48, title: "未来城市设计趋势：极简主义建筑如何提升都市人的生活幸福感" },
            { id: 54, title: "深海探测新发现：在马里亚纳海沟 8000 米处发现未知生物种群" },
            { id: 60, title: "森林康养产业爆发：晨曦中的负氧离子竟然有如此神奇的治愈力" },
            { id: 65, title: "赛博朋克现实版：东京涩谷街头的霓虹灯光背后的能源革命" },
            { id: 76, title: "荒野求生指南：在极端干旱环境下，如何寻找第一口救命水源？" },
            { id: 82, title: "AI 绘画与人类艺术：当算法开始理解抽象美学，艺术家的边界在哪里？" },
            { id: 101, title: "高山草甸的秘密：为何这里的植被在严冬之后能迅速复苏？" },
            { id: 103, title: "极光之谜：2026 年太阳活动高峰期，北极圈外的观测指南" }
        ];

        const dates = [{ day: "今日精选", month: "2026年1月31日" }];

        function generateContent() {
            const root = document.getElementById('content-root');
            dates.forEach((date, dateIdx) => {
                const section = document.createElement('section');
                section.className = 'date-section';
                section.innerHTML = `<p class="date-day">${date.day}</p><p class="date-month">${date.month}</p>`;
                root.appendChild(section);

                const grid = document.createElement('main');
                grid.className = 'wallpaper-grid';
                
                for (let i = 0; i < 10; i++) {
                    const news = newsData[i % newsData.length];
                    const card = document.createElement('div');
                    card.className = 'wallpaper-card';
                    card.innerHTML = `
                        <img class="wallpaper-img" src="https://picsum.photos/id/${news.id}/400/800" onload="this.style.opacity=1">
                        <div class="wallpaper-info">
                            <div class="wallpaper-name clickable-news-title">
                                <span>${news.title}</span>
                                <div class="news-arrow-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);

                    if (i === 3) {
                        const ad = document.createElement('div');
                        ad.className = `ad-banner ad-image-only ad-large`;
                        ad.innerHTML = `
                            <div class="ad-badge">广告</div>
                            <img class="ad-full-img" src="https://picsum.photos/id/119/640/250">
                            <div class="ad-overlay">
                                <div style="color: #FFD700; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px;">Limited Offer</div>
                                <div style="color: #fff; font-size: 20px; font-weight: 900; line-height: 1.2;">AnyWP Pro<br>会员限时 6 折</div>
                                <div style="margin-top: 12px; display: inline-block; background: #fff; color: #000; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 4px; width: fit-content;">立即领取</div>
                            </div>
                        `;
                        grid.appendChild(ad);
                    }
                }
                root.appendChild(grid);
            });
        }
        generateContent();
    </script>
</body>
</html>
