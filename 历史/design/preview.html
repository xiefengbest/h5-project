<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AnyWP - Preview</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .preview-page {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .nav-header {
            height: 44px;
            padding: calc(var(--safe-area-top) + 10px) 16px 0;
            display: flex;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .preview-back {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            color: #fff;
        }

        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-footer {
            position: absolute;
            bottom: calc(var(--safe-area-bottom) + 30px);
            left: 20px;
            right: 20px;
            z-index: 100;
        }

        .clickable-news-title {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .preview-title.clickable-news-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 24px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .preview-title.clickable-news-title span {
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .news-arrow-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .news-arrow-icon svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
        }

        .preview-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
        }

        .preview-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            color: #fff;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

    </style>
</head>
<body>
    <div class="preview-page">
        <div class="preview-header nav-header">
            <div class="preview-back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
        </div>
        <img class="preview-img" src="https://picsum.photos/id/10/800/1600">
        <div class="preview-footer">
            <div class="preview-title clickable-news-title">
                <span>莫奈花园：探索印象派大师笔下的色彩美学与自然光影</span>
                <div class="news-arrow-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </div>
            </div>
            <div class="preview-actions">
                <div class="preview-stat">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                    <span>1.9W</span>
                </div>
                <button class="preview-btn">加入锁屏</button>
            </div>
        </div>
    </div>
</body>
</html>
